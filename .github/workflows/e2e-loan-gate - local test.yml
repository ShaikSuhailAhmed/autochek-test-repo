name: E2E API + UI Automation Workflow

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

env:
  API_BLOCK_SEVERITIES: blocker,critical,sev1,p0
  UI_BLOCK_SEVERITIES: blocker,critical

jobs:
  e2e-tests:
    runs-on: ubuntu-latest

    steps:
      # =========================================================
      # Checkout current repo
      # =========================================================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================================================
      # Validate required folders
      # =========================================================
      - name: Validate automation folders
        run: |
          test -d api-automation || (echo "::error::api-automation folder not found" && exit 1)
          test -d ui-automation || (echo "::error::ui-automation folder not found" && exit 1)
          test -f api-automation/pom.xml || (echo "::error::api-automation/pom.xml not found" && exit 1)
          test -f ui-automation/pom.xml || (echo "::error::ui-automation/pom.xml not found" && exit 1)

      # =========================================================
      # Setup Java
      # =========================================================
      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'temurin'
          cache: maven

      # =========================================================
      # Run API Tests
      # =========================================================
      - name: Run API E2E Tests
        id: api_test
        working-directory: api-automation
        shell: bash
        run: |
          set +e
          mvn -B clean test \
            -Dsurefire.suiteXmlFiles=testng-api.xml \
            -Dallure.results.directory=target/allure-results
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit 0

      # =========================================================
      # Install API module (CRITICAL FIX)
      # =========================================================
      - name: Install API module for UI dependency
        working-directory: api-automation
        run: mvn -B clean install -DskipTests

      # =========================================================
      # Run UI Tests
      # =========================================================
      - name: Run UI E2E Tests
        id: ui_test
        working-directory: ui-automation
        shell: bash
        run: |
          set +e
          mvn -B clean test \
            -Dsurefire.suiteXmlFiles=testng-ui.xml \
            -Dallure.results.directory=target/allure-results
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit 0

      # =========================================================
      # Print exit codes
      # =========================================================
      - name: Print test exit codes
        run: |
          echo "API Maven exit code: ${{ steps.api_test.outputs.exit_code }}"
          echo "UI Maven exit code: ${{ steps.ui_test.outputs.exit_code }}"

      # =========================================================
      # Verify Allure results
      # =========================================================
      - name: Verify Allure results exist
        id: verify
        shell: bash
        run: |
          mkdir -p api-automation/target/allure-results
          mkdir -p ui-automation/target/allure-results

          API_COUNT=$(find api-automation/target/allure-results -type f -name "*.json" ! -path "*/history/*" | wc -l)
          UI_COUNT=$(find ui-automation/target/allure-results -type f -name "*.json" ! -path "*/history/*" | wc -l)

          echo "api_count=$API_COUNT" >> "$GITHUB_OUTPUT"
          echo "ui_count=$UI_COUNT" >> "$GITHUB_OUTPUT"

          echo "API Allure JSON count: $API_COUNT"
          echo "UI Allure JSON count: $UI_COUNT"

      # =========================================================
      # Checkout gh-pages
      # =========================================================
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: ghp
        continue-on-error: true

      # =========================================================
      # Prepare gh-pages base
      # =========================================================
      - name: Prepare gh-pages base
        run: |
          mkdir -p ghp
          mkdir -p ghp/latest/api ghp/latest/ui

      # =========================================================
      # Restore Allure history
      # =========================================================
      - name: Restore Allure history
        run: |
          mkdir -p api-automation/target/allure-results/history
          mkdir -p ui-automation/target/allure-results/history

          cp -r ghp/latest/api/history/. api-automation/target/allure-results/history/ 2>/dev/null || true
          cp -r ghp/latest/ui/history/. ui-automation/target/allure-results/history/ 2>/dev/null || true

      # =========================================================
      # Install Allure CLI
      # =========================================================
      - name: Install Allure CLI
        run: npm install -g allure-commandline

      # =========================================================
      # Generate API Allure report
      # =========================================================
      - name: Generate API Allure report
        if: steps.verify.outputs.api_count != '0'
        run: |
          allure generate api-automation/target/allure-results \
            -o api-automation/target/allure-report --clean

      # =========================================================
      # Generate UI Allure report
      # =========================================================
      - name: Generate UI Allure report
        if: steps.verify.outputs.ui_count != '0'
        run: |
          allure generate ui-automation/target/allure-results \
            -o ui-automation/target/allure-report --clean

      # =========================================================
      # Compute archive directory
      # =========================================================
      - name: Compute archive directory
        id: meta
        run: |
          TS=$(date -u +"%Y-%m-%d_%H-%M-%S")
          SHORT_SHA=${GITHUB_SHA::7}
          DEST="${TS}_${SHORT_SHA}"
          echo "dest_dir=$DEST" >> "$GITHUB_OUTPUT"

      # =========================================================
      # Prepare gh-pages content
      # =========================================================
      - name: Prepare gh-pages content
        run: |
          DEST="${{ steps.meta.outputs.dest_dir }}"

          mkdir -p ghp/${DEST}/api ghp/${DEST}/ui
          mkdir -p ghp/latest/api ghp/latest/ui

          if [ -d api-automation/target/allure-report ]; then
            rm -rf ghp/latest/api/*
            cp -r api-automation/target/allure-report/. ghp/${DEST}/api/
            cp -r api-automation/target/allure-report/. ghp/latest/api/
          fi

          if [ -d ui-automation/target/allure-report ]; then
            rm -rf ghp/latest/ui/*
            cp -r ui-automation/target/allure-report/. ghp/${DEST}/ui/
            cp -r ui-automation/target/allure-report/. ghp/latest/ui/
          fi

          touch ghp/.nojekyll

      # =========================================================
      # Publish gh-pages
      # =========================================================
      - name: Publish gh-pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ghp
          keep_files: true

      # =========================================================
      # Job Summary (NEW)
      # =========================================================
      - name: Job Summary
        if: always()
        run: |
          BASE="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"

          {
            echo "## 🚀 Allure Reports"
            echo ""
            echo "- 🔗 [API Report](${BASE}/latest/api/)"
            echo "- 🔗 [UI Report](${BASE}/latest/ui/)"
            echo ""
            echo "### 📊 Execution Summary"
            echo "- API JSON Count: ${{ steps.verify.outputs.api_count }}"
            echo "- UI JSON Count: ${{ steps.verify.outputs.ui_count }}"
          } >> $GITHUB_STEP_SUMMARY

      # =========================================================
      # Final Gate
      # =========================================================
      - name: Final PR Gate
        if: always()
        run: |
          API_EXIT="${{ steps.api_test.outputs.exit_code }}"
          UI_EXIT="${{ steps.ui_test.outputs.exit_code }}"

          if [ "$API_EXIT" != "0" ]; then
            echo "::error::API tests failed"
            exit 1
          fi

          if [ "$UI_EXIT" != "0" ]; then
            echo "::error::UI tests failed"
            exit 1
          fi
