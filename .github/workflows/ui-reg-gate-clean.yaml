name: UI Regression Automation Workflow

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

env:
  UI_BLOCK_SEVERITIES: blocker,critical
  AUTOMATION_REPO: ShaikSuhailAhmed/autochek-ui-automation-clean

jobs:
  ui-tests:
    runs-on: ubuntu-latest

    steps:

      # =========================================================
      # Checkout UI automation repo
      # =========================================================
      - name: Checkout UI automation repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.AUTOMATION_REPO }}
          token: ${{ secrets.MY_UI_AUTOMATION_CLEAN }}
          path: ui-automation

      # =========================================================
      # Setup Java
      # =========================================================
      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'temurin'
          cache: maven

      # =========================================================
      # Install Chrome
      # =========================================================
      - name: Install Chrome
        run: |
          sudo apt update
          sudo apt install -y google-chrome-stable

      # =========================================================
      # Run UI Tests
      # =========================================================
      - name: Run UI Regression Tests
        working-directory: ui-automation
        continue-on-error: true
        run: |
          mvn -B clean test \
            -DsuiteXmlFile=testng.xml \
            -Dallure.results.directory=target/allure-results

      # =========================================================
      # Verify Allure results
      # =========================================================
      - name: Verify Allure results exist
        id: verify
        run: |
          UI_COUNT=$(find ui-automation/target/allure-results -name "*.json" -not -path "*/history/*" | wc -l)

          echo "ui_count=$UI_COUNT" >> $GITHUB_OUTPUT

          if [ "$UI_COUNT" -eq 0 ]; then
            echo "::error::Allure results missing"
            exit 1
          fi

      # =========================================================
      # Checkout gh-pages branch
      # =========================================================
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: ghp
        continue-on-error: true

      # =========================================================
      # Restore Allure history
      # =========================================================
      - name: Restore Allure history
        run: |
          mkdir -p ui-automation/target/allure-results/history
          if [ -d "ghp/regression_ui/latest/history" ]; then
            cp -r ghp/regression_ui/latest/history/* ui-automation/target/allure-results/history/ || true
          fi

      # =========================================================
      # Generate Allure report
      # =========================================================
      - name: Generate Allure report
        run: |
          npm install -g allure-commandline
          allure generate ui-automation/target/allure-results -o ui-automation/target/allure-report --clean

      # =========================================================
      # Compute archive directory
      # =========================================================
      - name: Compute archive directory
        id: meta
        run: |
          TS=$(date -u +"%Y-%m-%d_%H-%M-%S")
          SHORT_SHA=${GITHUB_SHA::7}
          DEST="${TS}_${SHORT_SHA}"
          echo "dest_dir=$DEST" >> $GITHUB_OUTPUT

      # =========================================================
      # Prepare gh-pages directories
      # =========================================================
      - name: Prepare gh-pages content
        run: |
          DEST="${{ steps.meta.outputs.dest_dir }}"

          mkdir -p ghp/regression_ui/${DEST}
          mkdir -p ghp/regression_ui/latest

          rm -rf ghp/regression_ui/latest/*

          cp -r ui-automation/target/allure-report/* ghp/regression_ui/${DEST}/
          cp -r ui-automation/target/allure-report/* ghp/regression_ui/latest/

      # =========================================================
      # Generate Dashboard
      # =========================================================
      - name: Generate Dashboard
        run: |
          cat <<EOF > ghp/index.html
          <!doctype html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>Test Automation Dashboard</title>
            <style>
              body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial; padding:40px; max-width:900px; margin:auto; line-height:1.5; color:#24292e;}
              h1 { border-bottom:1px solid #eaecef; padding-bottom:10px;}
              .section{margin-bottom:30px;}
              .run{display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #f0f0f0;}
              .latest{background:#f6f8fa;padding:20px;border-radius:6px;border:1px solid #d1d5da;}
              a{color:#0366d6;text-decoration:none;font-weight:500;}
            </style>
          </head>

          <body>

          <h1>Test Automation Dashboard</h1>

          $(if [ -d "ghp/e2e/latest/api" ]; then
            echo "<div class='section latest'>"
            echo "<h2>🚀 Latest E2E Runs</h2>"
            echo "<a href='./e2e/latest/api/'>API E2E</a><br>"
            echo "<a href='./e2e/latest/ui/'>UI E2E</a>"
            echo "</div>"
          fi)

          $(if [ -d "ghp/regression/latest" ]; then
            echo "<div class='section latest'>"
            echo "<h2>🚀 Latest Regression Run</h2>"
            echo "<a href='./regression/latest/'>API Regression</a>"
            echo "</div>"
          fi)
           $(if [ -d "ghp/regression_ui/latest" ]; then
            echo "<div class='section latest'>"
            echo "<h2>🚀 Latest UI Regression Run</h2>"
            echo "<a href='./regression_ui/latest/'>UI Regression</a>"
            echo "</div>"
          fi)

          
          $(if [ -d "ghp/e2e" ]; then
            echo "<div class='section'>"
            echo "<h2>📅 Historical E2E Runs</h2>"
          
            for run in $(ls -1 ghp/e2e | grep -E '^[0-9]{4}-' | sort -r); do
              echo "<div class='run'><span>$run</span>"
              echo "<span><a href='./e2e/$run/api/'>API</a> | <a href='./e2e/$run/ui/'>UI</a></span></div>"
            done
          
            echo "</div>"
          fi)
          
          $(if [ -d "ghp/regression" ]; then
            echo "<div class='section'>"
            echo "<h2>📅 Historical API Regression Runs</h2>"
          
            for run in $(ls -1 ghp/regression 2>/dev/null | grep -E '^[0-9]{4}-' | sort -r); do
              echo "<div class='run'><span>$run</span><a href='./regression/$run/'>API Regression Report</a></div>"
            done
          
            echo "</div>"
          fi)
           $(if [ -d "ghp/regression_ui" ]; then
            echo "<div class='section'>"
            echo "<h2>📅 Historical UI Regression Runs</h2>"

            for run in $(ls -1 ghp/regression_ui 2>/dev/null | grep -E '^[0-9]{4}-' | sort -r); do
              echo "<div class='run'><span>$run</span><a href='./regression_ui/$run/'>UI Regression Report</a></div>"
            done

            echo "</div>"
          fi)

      # =========================================================
      # Publish gh-pages
      # =========================================================
      - name: Publish gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ghp
          keep_files: true

      # =========================================================
      # Job Summary
      # =========================================================
      - name: Job Summary
        if: always()
        run: |
          BASE="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"

          {
            echo "## Allure Reports"
            echo "- [UI Report](${BASE}/regression_ui/latest/)"
          } >> "$GITHUB_STEP_SUMMARY"

      # =========================================================
      # FINAL PR GATE
      # =========================================================
      - name: Final PR Gate
        if: always()
        run: |
          UI_BLOCK=$(jq -r --arg block "${UI_BLOCK_SEVERITIES}" '
            ( $block | split(",") ) as $sevlist
            | select(.status=="failed" or .status=="broken")
            | (.labels[]? | select(.name=="severity") | .value | ascii_downcase) as $sev
            | select($sevlist | index($sev))
          ' ui-automation/target/allure-results/*.json 2>/dev/null | wc -l)

          if [ "$UI_BLOCK" -gt 0 ]; then
            echo "::error::Blocking severe UI failures detected ($UI_BLOCK UI)"
            exit 1
          fi
